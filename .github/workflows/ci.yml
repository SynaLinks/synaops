name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-linux:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --release

      - name: Install synaops + test deps
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-benchmark
          pip install git+https://github.com/SynaLinks/synalinks.git
          pip install .

      - name: Parity tests
        run: pytest bench/test_parity.py -v

  test-cross:
    name: smoke ${{ matrix.os }} / py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: cargo test
        run: cargo test --release

      - name: Install synaops
        run: |
          python -m pip install --upgrade pip
          pip install .

      - name: Import smoke test
        run: |
          python -c "import synaops; print(synaops.prefix_json({'a': 1}, 'pre'))"
